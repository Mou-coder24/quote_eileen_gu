<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* Perfectly flattens the canvas to prevent any edge gaps */
        html, body {
            margin: 0;
            padding: 0;
            background-color: transparent;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        /* Clean, flat Walnut Frame with zero shadows */
        .outer-frame {
            background-color: #a47552; /* Muted Dark Walnut tone */
            border-radius: 12px;
            padding: 6px;
            width: 100%; /* Spans seamlessly across the entire Notion column container */
            box-sizing: border-box;
            text-align: center;
            border: 1px solid rgba(0, 0, 0, 0.1); /* Subtle definition border instead of a shadow */
        }
        /* Flat Inner Matte Paper */
        .inner-matte {
            background-color: #f6f1ec; /* Clean gallery off-white paper */
            border-radius: 6px;
            padding: 20px 14px;
        }
        .quote-text {
            color: #2e2e2e; /* Dark print ink */
            font-size: 20px;
            font-weight: 500;
            line-height: 1.5;
            margin: 0 0 14px 0;
            font-style: italic;
        }
        .quote-author {
            color: #8a8580;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body>

<div class="outer-frame">
    <div class="inner-matte">
        <p class="quote-text">"I train like I've never won, and I compete like I've never lost."</p>
        <div class="quote-author">— Eileen Gu</div>
    </div>
</div>

</body>
</html>
