<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            margin: 0; padding: 0; background: transparent;
            display: flex; justify-content: center; align-items: flex-start;
        }
        
        .quote-container {
            width: 100%;
            color: #64473a; /* Deep Walnut */
            text-align: left;
            padding: 30px 10px;
        }

        .large-comma {
            font-size: 60px;
            font-family: Georgia, serif;
            font-weight: 800;
            line-height: 0.5;
            color: #b07a52; /* Accent color */
        }

        .text-body {
            font-size: 22px;
            font-weight: 400;
            font-style: italic;
            margin-left: 20px; /* Slight right-indent as requested */
            margin-top: 10px;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .author {
            margin-top: 15px;
            margin-left: 25px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: #8a7a72;
        }
    </style>
</head>
<body>

<div class="quote-container">
    <div class="large-comma">“</div>
    <div class="text-body">
        I train like I've never won, and I compete like I've never lost.
    </div>
    <div class="large-comma" style="transform: rotate(180deg); margin-left: auto; width: fit-content;">“</div>
    <div class="author">— Eileen Gu</div>
</div>

</body>
</html>
